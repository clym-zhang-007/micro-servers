var(--purple);cursor:pointer;font-size:12px;margin-top:6px;display:inline-block}.prompt-expand:hover{text-decoration:underline}.source-loc{display:inline-flex;align-items:center;gap:4px;background:#161b28;border:1px solid var(--b);border-radius:8px;padding:3px 8px;font-size:11px;font-family:var(--mono);color:var(--m)}.source-loc:hover{border-color:var(--purple);color:var(--purple)}.full-prompt{background:#0f1220;border:1px solid rgba(185,131,255,.25);border-radius:12px;padding:16px;margin:12px 0}.full-prompt .prompt-label{font-size:11px;color:var(--purple);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}.full-prompt .prompt-text{font-family:var(--mono);font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-word;color:#d0c0f0}@media(max-width:1300px){.layout{grid-template-columns:380px 1fr}.detail{grid-column:1/-1;height:52vh;border-left:0;border-top:1px solid var(--b)}}

<script>
const codeData={"file": {"name": "2-langsmith_testing_evaluation.py", "path": "E:\\AI-Projects\\micro-code-case\\test-evaluation-langSmith\\2-langsmith_testing_evaluation.py", "title": "LangSmith 测试与评估模块", "role": "为混合智能体提供自动化测试与评估管道", "frameworks": ["LangSmith", "LangGraph", "LangChain"], "line_count": 213, "function_count": 6, "class_count": 2}, "defaultNode": "create_test_dataset", "nodes": {"entry_main": {"id": "entry_main", "name": "__main__ 入口", "type": "Entry", "paradigm": "顺序编排：检查环境 → 创建数据集 → 运行评估 → 展示结果", "role": "CLI 入口，串联整个测试与评估流程", "input": "无（读取环境变量）", "output": "控制台输出评估进度和结果链接", "position": "脚本末尾，流程终点", "code": "if __name__ == \"__main__\":                                    # 入口检查\n    if not LANGSMITH_ENABLED or not client:                   # 检查 LangSmith 是否可用，否则退出进程（第 185 行）\n        exit(1)\n    dataset_name = \"wealth-advisor-test-dataset\"             # 指定数据集名称（第 195 行）\n    created_dataset = create_test_dataset(dataset_name)        # 创建或复用数据集（第 196 行）\n    if not created_dataset:\n        exit(1)                                                # 数据集准备失败则退出（第 197 行）\n    experiment_name = f\"wealth-advisor-eval-{datetime.now().strftime('%Y%m%d-%H%M%S')}\"  # 生成带时间戳的实验名（第 201 行）\n    results = run_evaluation(dataset_name, experiment_name)    # 运行评估管道（第 206 行）\n", "explanation": "入口函数以防御性检查开头（LangSmith 是否启用），然后按顺序调用 create_test_dataset 和 run_evaluation 两个核心函数，形成完整的测试→评估→报告流水线。", "learning": "注意它是如何先创建数据集再运行评估的——数据集是评估的基础设施，必须先就绪。实验名称带时间戳保证每次运行结果可追溯。", "short": "入口编排：环境检查→数据集→评估→报告"}, "create_test_dataset": {"id": "create_test_dataset", "name": "create_test_dataset", "type": "Core", "paradigm": "先查后建（check-then-create）：尝试读取已有数据集，不存在则新建并批量导入测试用例", "role": "在 LangSmith 平台创建测试数据集，包含全部测试用例的输入和预期输出", "input": "dataset_name（字符串）", "output": "dataset_name（成功）或 None（失败）", "position": "流程第二阶段，评估之前", "code": "def create_test_dataset(dataset_name: str = \"wealth-advisor-test-dataset\") -> Optional[str]:\n    if not client:\n        return None                                            # 客户端未初始化则返回\n    try:\n        try:\n            client.read_dataset(dataset_name=dataset_name)      # 检查数据集是否已存在（第 130 行）\n            existing_examples = list(client.list_examples(dataset_name=dataset_name))  # 统计现有用例数量（第 132 行）\n            if len(existing_examples) > 0:\n                return dataset_name                            # 已有用例，直接复用（第 135 行）\n        except Exception:\n            client.create_dataset(dataset_name=dataset_name, description=\"投顾AI助手测试数据集\")  # 不存在则创建（第 138 行）\n        for test_case in ALL_TEST_CASES:\n            client.create_example(inputs=test_case[\"inputs\"], outputs=test_case.get(\"expected_outputs\", {}), dataset_name=dataset_name)  # 批量导入用例（第 143 行）\n        return dataset_name\n", "explanation": "采用先查后建的策略，避免重复创建数据集。如果数据集已存在且有测试用例，直接复用；否则创建并批量导入 ALL_TEST_CASES 中的每个用例。对 already exists 错误做静默跳过，保证批量导入的容错性。", "learning": "这种容错模式很常见：先用 read_dataset 检测，再用 create_dataset 创建，最后循环导入时对 duplicate 错误 continue。写类似脚本时可以照搬这个模板。", "short": "创建或复用 LangSmith 测试数据集"}, "run_evaluation": {"id": "run_evaluation", "name": "run_evaluation", "type": "Core", "paradigm": "闭包+evaluate 模式：将本地函数作为 target 传入 LangSmith 的 evaluate() 框架", "role": "运行完整的评估管道，对数据集的每个用例调用被测智能体并用评估器打分", "input": "dataset_name, experiment_name, evaluators（可选）", "output": "evaluate() 返回的评估结果对象", "position": "流程第三阶段，最后一步", "code": "def run_evaluation(dataset_name, experiment_name=None, evaluators=None):\n    if not experiment_name:\n        experiment_name = f\"wealth-advisor-eval-{datetime.now().strftime('%Y%m%d-%H%M%S')}\"  # 生成带时间戳的实验名，保证唯一性（第 161 行）\n    if not evaluators:\n        evaluators = [ProcessingModeEvaluator(), ResponseCompletenessEvaluator()]  # 使用默认的 2 个自定义评估器（第 163 行）\n    def test_function(example: Example) -> Dict[str, Any]:       # 定义被测函数闭包（第 165 行）\n        example_inputs = _get_example_inputs(example)            # 从 Example 提取 inputs（第 167 行）\n        user_query = example_inputs.get(\"user_query\", \"\")        # 提取查询字符串（第 168 行）\n        customer_id = example_inputs.get(\"customer_id\", \"customer1\")  # 提取客户 ID（第 169 行）\n        result = run_wealth_advisor(user_query=user_query, customer_id=customer_id)  # 调用主智能体（第 172 行）\n        return {\"final_response\": ..., \"processing_mode\": ..., \"query_type\": ...}  # 返回标准化结果（第 173 行）\n    return evaluate(test_function, data=dataset_name, evaluators=evaluators, experiment_prefix=experiment_name, max_concurrency=1)  # 运行评估（第 182 行）\n", "explanation": "定义了 test_function 闭包，将 LangSmith 的 Example 对象映射为对被测智能体的调用。每个 Example 的 inputs 被提取为 user_query 和 customer_id，调用 run_wealth_advisor 后返回标准化结果字典。最终调用 evaluate() 框架自动并行执行所有用例并收集评估分数。", "learning": "test_function 是 LangSmith evaluate 的核心——它定义了被测函数的签名（接收 Example，返回 dict）。闭包捕获了 evaluator 列表和 dataset_name，这样 evaluate 框架内部只需要负责调度。", "short": "运行 LangSmith 评估管道"}, "processing_mode_evaluator": {"id": "processing_mode_evaluator", "name": "ProcessingModeEvaluator", "type": "Core", "paradigm": "RunEvaluator 接口实现：重写 evaluate_run 方法，对比期望模式与实际模式", "role": "评估智能体是否正确选择了处理模式（reactive vs deliberative）", "input": "Run（实际运行）, Example（测试用例，含 expected_outputs.processing_mode）", "output": "{key, score: 0.0/1.0, comment}", "position": "评估管道中的第一个评估器", "code": "class ProcessingModeEvaluator(RunEvaluator):\n    def evaluate_run(self, run: Run, example: Example, **kwargs) -> Dict[str, Any]:\n        expected_mode = _get_example_outputs(example).get(\"processing_mode\")      # 从测试用例提取期望模式（第 96 行）\n        if not expected_mode:\n            return {\"key\": \"processing_mode\", \"score\": None, \"comment\": \"未指定期望的处理模式\"}  # 跳过未指定模式的用例（第 98 行）\n        actual_mode = run.outputs.get(\"processing_mode\") if run.outputs else None  # 获取实际运行模式（第 99 行）\n        if actual_mode == expected_mode:\n            return {\"key\": \"processing_mode\", \"score\": 1.0, \"comment\": f\"处理模式正确: {actual_mode}\"}  # 匹配得 1 分（第 101 行）\n        return {\"key\": \"processing_mode\", \"score\": 0.0, \"comment\": f\"处理模式不匹配: 期望 {expected_mode}, 实际 {actual_mode}\"}  # 不匹配得 0 分（第 102 行）\n", "explanation": "实现了 LangSmith 的 RunEvaluator 接口，通过比较 run.outputs 中的实际 processing_mode 和 example 中期望的模式来打分。返回 1.0 表示匹配，0.0 表示不匹配。如果测试用例没有指定期望模式，则跳过评估（score=None）。", "learning": "注意 score 为 None 的情况——这表示不适用而非失败。在 LangSmith 面板中，None 分数不会被计入平均值，这对于可选评估场景很有用。", "short": "判断智能体是否正确选择了处理模式"}, "response_completeness_evaluator": {"id": "response_completeness_evaluator", "name": "ResponseCompletenessEvaluator", "type": "Core", "paradigm": "关键词覆盖率评分：统计实际响应中包含多少个期望关键词，计算比率", "role": "评估智能体响应是否包含预期的关键信息点", "input": "Run（含 final_response）, Example（含 should_contain 关键词列表）", "output": "{key, score: 0.0~1.0, comment}", "position": "评估管道中的第二个评估器", "code": "class ResponseCompletenessEvaluator(RunEvaluator):\n    def evaluate_run(self, run: Run, example: Example, **kwargs) -> Dict[str, Any]:\n        if not run.outputs or \"final_response\" not in run.outputs:\n            return {\"key\": \"response_completeness\", \"score\": 0, \"comment\": \"无响应输出\"}  # 无响应给 0 分（第 111 行）\n        response = run.outputs.get(\"final_response\", \"\")         # 获取最终响应文本（第 112 行）\n        expected_keywords = _get_example_outputs(example).get(\"should_contain\", [])  # 提取期望关键词列表（第 113 行）\n        if not expected_keywords:\n            return {\"key\": \"response_completeness\", \"score\": None, \"comment\": \"未指定期望的关键词\"}  # 无关键词则跳过（第 115 行）\n        response_lower = response.lower()                        # 转小写便于匹配（第 116 行）\n        found_keywords = [kw for kw in expected_keywords if kw.lower() in response_lower]  # 查找匹配关键词（第 117 行）\n        completeness = len(found_keywords) / len(expected_keywords)  # 计算覆盖率比率（第 118 行）\n        return {\"key\": \"response_completeness\", \"score\": completeness, \"comment\": f\"找到 {len(found_keywords)}/{len(expected_keywords)} 个期望关键词\"}  # 返回分数（第 119 行）\n", "explanation": "通过关键词覆盖率来量化响应完整性。将响应文本和期望关键词都转为小写后做子串匹配，score = 找到的关键词数 / 期望总数。这是一种简单但有效的完备性度量。", "learning": "关键词匹配虽然简单但有局限——同义词和语义等价无法识别。如果需要更精确的评估，可以替换为 LLM-as-judge 或 embedding 相似度方案。但在快速测试场景下，这种方案足够了。", "short": "关键词覆盖率评估响应完整性"}, "helper_funcs": {"id": "helper_funcs", "name": "_get_example_inputs / _get_example_outputs", "type": "Utility", "paradigm": "防御性解析：兼容 Example 对象和 dict 两种输入格式，逐级 fallback", "role": "从 LangSmith Example 对象或 dict 中提取 inputs/outputs，处理格式不统一的情况", "input": "example（Example 对象或 dict）", "output": "dict（inputs 或 outputs）", "position": "模块中部，评估器定义之前", "code": "def _get_example_inputs(example):\n    try:\n        if hasattr(example, \"inputs\") and example.inputs is not None:                 # 优先：Example 对象的 .inputs 属性（第 70 行）\n            return example.inputs if isinstance(example.inputs, dict) else {}\n        if isinstance(example, dict):\n            if \"inputs\" in example: return example[\"inputs\"] if isinstance(example[\"inputs\"], dict) else {}  # 兼容 dict 格式（第 74 行）\n            if \"user_query\" in example: return example                                # 兼容扁平 dict 格式（第 75 行）\n    except Exception:\n        pass\n    return {}\n", "explanation": "这两个辅助函数处理了 LangSmith Example 对象可能的两种形态：有 .inputs/.outputs 属性的对象，和嵌套了 inputs/outputs 键的 dict。通过 try/except + hasattr + isinstance 的组合防御，确保无论哪种格式都能正确提取。", "learning": "这种防御性解析在对接第三方 API 时很常见——你永远不知道对方会返回什么格式。核心思路是先试最标准的，再降级尝试。", "short": "兼容 Example 对象和 dict 格式的输入提取"}, "test_data": {"id": "test_data", "name": "测试数据集定义", "type": "State", "paradigm": "结构化测试用例：按处理模式分组（reactive / deliberative / edge），每组包含输入和预期输出", "role": "定义三类测试用例，覆盖快速响应、深度分析和边界情况", "input": "无（模块级常量）", "output": "REACTIVE_TEST_CASES（3 条）+ DELIBERATIVE_TEST_CASES（3 条）+ EDGE_CASE_TEST_CASES（2 条）= 8 条", "position": "模块顶部，导入之后", "code": "REACTIVE_TEST_CASES = [                                          # 反应式查询测试用例（第 48 行）\n    {\"inputs\": {\"user_query\": \"今天上证指数的表现如何？\", \"customer_id\": \"customer1\"}, \"expected_outputs\": {\"processing_mode\": \"reactive\", \"should_contain\": [\"上证指数\", \"点位\", \"涨跌\"]}},\n    {\"inputs\": {\"user_query\": \"我的投资组合中科技股占比是多少？\", ...}, \"expected_outputs\": {...}},\n    {\"inputs\": {\"user_query\": \"请解释一下什么是ETF？\", ...}, \"expected_outputs\": {...}}\n]\nDELIBERATIVE_TEST_CASES = [                                      # 深思熟虑测试用例（第 54 行）\n    {\"inputs\": {\"user_query\": \"根据当前市场情况，我应该如何调整投资组合以应对可能的经济衰退？\", ...}, \"expected_outputs\": {\"processing_mode\": \"deliberative\", ...}},\n    ...\n]\nEDGE_CASE_TEST_CASES = [                                         # 边界情况测试用例（第 60 行）\n    {\"inputs\": {\"user_query\": \"\", ...}, \"expected_outputs\": {\"should_handle_error\": True}},\n    {\"inputs\": {\"user_query\": \"这是一个非常长的查询\" * 100, ...}, \"expected_outputs\": {\"should_handle\": True}}\n]\nALL_TEST_CASES = REACTIVE_TEST_CASES + DELIBERATIVE_TEST_CASES + EDGE_CASE_TEST_CASES  # 合并全部（第 65 行）\n", "explanation": "定义了 8 个测试用例，按场景分为三组。REACTIVE_TEST_CASES 测试简单查询是否触发反应式处理（3 条）；DELIBERATIVE_TEST_CASES 测试复杂分析是否触发深思熟虑处理（3 条）；EDGE_CASE_TEST_CASES 测试边界情况如空输入和超长输入（2 条）。每个用例包含 inputs（传给智能体的参数）和 expected_outputs（用于评估的预期结果）。", "learning": "测试用例的结构设计很关键：inputs 必须与被测函数签名一致，expected_outputs 中的 processing_mode 和 should_contain 字段会被两个自定义评估器消费。增加测试用例只需往对应列表添加新元素。", "short": "8 条测试用例，覆盖反应式、深思熟虑和边界情况"}, "langsmith_client": {"id": "langsmith_client", "name": "LangSmith 客户端初始化", "type": "External", "paradigm": "条件初始化：检查环境变量后按需创建 LangSmith Client", "role": "读取环境变量，初始化 LangSmith 客户端，决定后续流程是否可执行", "input": "LANGSMITH_API_KEY, LANGCHAIN_TRACING_V2 环境变量", "output": "client 实例（成功）或 None（未启用）", "position": "模块顶部，数据定义之前", "code": "LANGSMITH_API_KEY = os.getenv(\"LANGSMITH_API_KEY\")                              # 从环境变量获取 API 密钥（第 35 行）\nLANGSMITH_ENABLED = os.getenv(\"LANGCHAIN_TRACING_V2\", \"\").lower() == \"true\"      # 检查追踪开关（第 36 行）\nif not LANGSMITH_ENABLED or not LANGSMITH_API_KEY:\n    print(\"警告: LangSmith 未启用，无法进行测试和评估\")\n    client = None\nelse:\n    client = Client(api_key=LANGSMITH_API_KEY)                                    # 初始化 LangSmith 客户端（第 45 行）\n", "explanation": "通过环境变量控制 LangSmith 的启用状态。API 密钥和 TRACING_V2 开关同时满足时才初始化 Client。这个设计允许代码在没有 LangSmith 配置的环境中也能安全导入（不会因缺少密钥而崩溃）。", "learning": "这种优雅降级模式很实用——外部服务不可用时不阻塞模块加载，只在真正需要时报错。对比直接在模块顶部写 Client() 初始化，这样做容错性更强。", "short": "LangSmith Client 条件初始化"}, "dynamic_import": {"id": "dynamic_import", "name": "动态导入主智能体", "type": "External", "paradigm": "importlib 动态加载：在不修改 sys.path 的情况下导入同级文件中的函数", "role": "通过 importlib 动态加载主智能体模块，获取 run_wealth_advisor 函数供测试调用", "input": "HYBRID_AGENT_PATH（相对路径，指向 1-hybrid_wealth_advisor_langgraph_langsmith.py）", "output": "run_wealth_advisor 函数被导入到当前模块", "position": "模块顶部，常量定义之前", "code": "HYBRID_AGENT_PATH = CURRENT_DIR / \"1-hybrid_wealth_advisor_langgraph_langsmith.py\"   # 定位主智能体脚本路径（第 20 行）\nspec = importlib.util.spec_from_file_location(\"hybrid_wealth_advisor_langgraph_langsmith\", HYBRID_AGENT_PATH)  # 创建模块规范（第 22 行）\nhybrid_module = importlib.util.module_from_spec(spec)                                  # 从规范创建模块（第 29 行）\nsys.modules[\"hybrid_wealth_advisor_langgraph_langsmith\"] = hybrid_module               # 注册到 sys.modules（第 30 行）\nspec.loader.exec_module(hybrid_module)                                                 # 执行模块代码（第 31 行）\nfrom hybrid_wealth_advisor_langgraph_langsmith import run_wealth_advisor               # 导入目标函数（第 33 行）\n", "explanation": "使用 importlib.util 动态加载同级目录下的主智能体文件，而不是用普通的 import 语句。这样做的好处是不需要在 PYTHONPATH 中添加目录，也不受文件名中的连字符影响（连字符在 Python 模块名中不合法）。", "learning": "当需要导入的文件名包含连字符（-）或者不在标准路径中时，importlib 动态加载是最佳选择。注意 spec.loader.exec_module 会执行目标文件的全部顶层代码——如果目标文件有副作用（如 print），也会被触发。", "short": "importlib 动态加载主智能体模块"}}, "flow": ["langsmith_client", {"type": "arrow"}, "dynamic_import", {"type": "arrow"}, "test_data", {"type": "arrow"}, "helper_funcs", {"type": "arrow"}, {"type": "branch", "paths": [{"label": "评估器", "nodes": ["processing_mode_evaluator", {"type": "arrow"}, "response_completeness_evaluator"]}, {"label": "核心函数", "nodes": ["create_test_dataset", {"type": "arrow"}, "run_evaluation"]}]}, {"type": "arrow"}, "entry_main"], "overview": {"what": "这是混合智能体的测试与评估模块，基于 LangSmith 平台实现自动化测试管道。它定义了两类自定义评估器（处理模式匹配和响应完整性），将 8 条测试用例组织为数据集，通过 LangSmith evaluate 框架批量运行并打分。", "function": "提供可复用的测试管道：创建数据集（或复用已有）→ 对每个用例调用智能体 → 用自定义评估器评分 → 在 LangSmith 面板展示结果", "type": "测试与评估模块", "entry": "__main__ 块（第 185 行），依次调用 create_test_dataset 和 run_evaluation", "advice": "先看测试数据定义了解被测场景，再看两个评估器理解评分逻辑，最后看 run_evaluation 的整体编排。"}, "mentalModel": {"metaphor": "就像学校考试：测试数据集是题库（预先准备好题目和标准答案），create_test_dataset 是发卷子（把题目分发给考生），run_evaluation 是考试过程（考生答题），两个评估器是阅卷老师（一个判模式对不对，一个判答案全不全），LangSmith 面板是成绩管理系统（汇总分数和统计）。", "concepts": [{"title": "数据集（Dataset）", "text": "LangSmith 中的测试用例集合，每条包含 inputs（输入参数）和 outputs（预期结果）。类似单元测试中的 fixture + expected。"}, {"title": "实验（Experiment）", "text": "一次完整的评估运行。每次运行创建新实验（带时间戳），便于对比不同版本的智能体表现。"}, {"title": "评估器（Evaluator）", "text": "实现了 RunEvaluator 接口的类，接收 Run 和 Example，返回评分。可以理解为自动化的断言函数（assert）。"}, {"title": "闭包（Closure）", "text": "run_evaluation 内部定义的 test_function 捕获了外部作用域的变量（evaluator 列表等），作为被测函数传给 evaluate 框架。"}], "dataFlow": "测试用例定义（常量）→ create_test_dataset 上传到 LangSmith 平台 → run_evaluation 从平台拉取用例 → 逐条调用 run_wealth_advisor → 结果经两个评估器打分 → 分数汇总到 LangSmith 实验面板"}, "readingPath": [{"node": "test_data", "label": "测试数据集定义", "why": "了解有哪些测试场景和预期结果，建立整体认知"}, {"node": "processing_mode_evaluator", "label": "ProcessingModeEvaluator", "why": "理解最核心的评分逻辑之一——如何判断模式选择正确"}, {"node": "response_completeness_evaluator", "label": "ResponseCompletenessEvaluator", "why": "理解第二个评分逻辑——如何量化响应完整性"}, {"node": "run_evaluation", "label": "run_evaluation", "why": "看整体编排——如何将评估器和测试函数组合成完整的评估管道"}, {"node": "entry_main", "label": "__main__ 入口", "why": "看最终调用链——如何串联整个流程"}], "tasks": [{"node": "entry_main", "title": "我想看入口在哪里", "desc": "从 __main__ 块开始，了解整个测试流程的执行顺序"}, {"node": "test_data", "title": "我想看测试用例怎么组织的", "desc": "看三类测试用例（反应式/深思熟虑/边界）的结构和预期输出"}, {"node": "processing_mode_evaluator", "title": "我想看怎么评估模式选择", "desc": "ProcessingModeEvaluator 如何判断智能体是否正确选择了 reactive 或 deliberative 模式"}, {"node": "response_completeness_evaluator", "title": "我想看怎么评估响应完整性", "desc": "ResponseCompletenessEvaluator 如何通过关键词覆盖率量化响应质量"}, {"node": "create_test_dataset", "title": "我想看数据集怎么创建", "desc": "先查后建模式：如何避免重复创建数据集并批量导入测试用例"}, {"node": "langsmith_client", "title": "我想看 LangSmith 怎么接入", "desc": "客户端初始化逻辑：如何优雅降级，无配置时不阻塞模块加载"}, {"node": "dynamic_import", "title": "我想看怎么动态导入智能体", "desc": "importlib 动态加载：为什么不用普通 import，以及如何处理连字符文件名"}, {"node": "helper_funcs", "title": "我想看兼容处理怎么做", "desc": "_get_example_inputs/outputs 如何兼容 Example 对象和 dict 两种格式"}], "stateData": {"summary": "本文件不定义状态模型，但定义了三类测试数据集常量，作为 LangSmith 评估的输入源", "items": [{"name": "REACTIVE_TEST_CASES", "stores": "3 条简单查询测试用例，预期 processing_mode = reactive", "importance": "验证智能体对快速查询正确选择反应式处理", "depends": ["run_evaluation"]}, {"name": "DELIBERATIVE_TEST_CASES", "stores": "3 条复杂分析测试用例，预期 processing_mode = deliberative", "importance": "验证智能体对深度分析正确选择深思熟虑处理", "depends": ["run_evaluation"]}, {"name": "EDGE_CASE_TEST_CASES", "stores": "2 条边界测试用例（空输入、超长输入）", "importance": "验证智能体的错误处理和容错能力", "depends": ["run_evaluation"]}, {"name": "ALL_TEST_CASES", "stores": "上述三组的合并（共 8 条）", "importance": "create_test_dataset 导入此列表到 LangSmith 平台", "depends": ["create_test_dataset"]}]}};
const S={tab:'overview',filter:'All',q:'',sel:codeData.defaultNode||null};
const tabs=[['overview','概述'],['flow','流程图'],['model','思维模型'],['reading','阅读路径'],['tasks','常用任务'],['prompts','提示词'],['state','状态 / 数据']];
const types=['All','Entry','Core','Utility','External','Prompt','State','Glue'];
const $=id=>document.getElementById(id);const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const nodes=()=>Object.values(codeData.nodes||{});const get=id=>(codeData.nodes||{})[id];
function init(){document.title=codeData.file.title||codeData.file.name;$('title').textContent=codeData.file.title||codeData.file.name;$('path').textContent=codeData.file.path||'';$('role').textContent=codeData.file.role||'';$('tags').innerHTML=(codeData.file.frameworks||[]).map(x=>`<span class="tag">${esc(x)}</span>`).join('');$('q').oninput=e=>{S.q=e.target.value;renderTab()};renderAll();if(S.sel)detail()}
function filtered(){let q=S.q.toLowerCase();return nodes().filter(n=>(S.filter==='All'||n.type===S.filter)&&(!q||[n.name,n.role,n.paradigm].join(' ').toLowerCase().includes(q)))}
function renderAll(){renderFilters();renderTabs();renderTab();renderFlow();detail()}
function renderFilters(){let has=new Set(nodes().map(n=>n.type));$('filters').innerHTML=types.filter(t=>t==='All'||has.has(t)).map(t=>`<button class="pill ${S.filter===t?'active':''}" onclick="S.filter='${t}';renderAll()">${t==='All'?'全部':`<span class="dot ${t}"></span>${t}`}</button>`).join('')}
function renderTabs(){$('tabs').innerHTML=tabs.map(([id,l])=>`<button class="tab ${S.tab===id?'active':''}" onclick="S.tab='${id}';renderAll()">${l}</button>`).join('')}
function cards(arr){return `<div class="list">${arr.map(n=>{let extra='';if(n.type==='Prompt'&&n.prompt){let pt=typeof n.prompt==='string'?n.prompt:JSON.stringify(n.prompt,null,2);let truncated=pt.length>180?pt.substring(0,180)+'...':pt;extra=`<div class="prompt-preview collapsed" data-id="${n.id}">${esc(truncated)}</div>`;if(pt.length>180)extra+=`<span class="prompt-expand" onclick="expandPrompt('${n.id}')">▼ 展开</span>`}if(n.sourceLine)extra+=`<div style="margin-top:6px"><span class="source-loc" title="点击在编辑器中打开" onclick="${n.sourceLink?`window.open('${n.sourceLink}','_blank')`:'void(0)'}">📍 ${esc(n.sourceFile||'')}:${esc(n.sourceLine||'')}</span></div>`;return `<div class="item" onclick="pick('${n.id}')"><span class="badge"><span class="dot ${n.type}"></span>${esc(n.type)}</span><h3><code>${esc(n.name)}</code></h3><p>${esc(n.role||'')}</p>${extra}</div>`}).join('')}</div>`}
function renderTab(){let o=codeData.overview||{},m=codeData.mentalModel||{},html='';if(S.tab==='overview')html=`<div class="card"><h3>这个文件是什么？</h3><p>${esc(o.what||codeData.file.role||'')}</p></div><div class="card"><h3>文件概述</h3><div class="grid"><div>功能</div><div>${esc(o.function||'')}</div><div>类型</div><div>${esc(o.type||'')}</div><div>入口</div><div><code>${esc(o.entry||'')}</code></div><div>框架</div><div>${esc((codeData.file.frameworks||[]).join(', '))}</div></div></div><div class="card hint"><b>学习建议</b><p>${esc(o.advice||'先看概述和思维模型，再按阅读路径点击节点学习。')}</p></div>`;else if(S.tab==='flow')html=`<div class="card"><h3>流程图</h3><p class="muted">中间区域展示主流程，点击节点查看右侧代码详情。</p></div>${cards(filtered())}`;else if(S.tab==='model')html=`<div class="card"><h3>思维模型</h3><p>${esc(m.metaphor||'')}</p></div>${(m.concepts||[]).map((c,i)=>`<div class="card"><h3>${i+1}. ${esc(c.title)}</h3><p>${esc(c.text)}</p></div>`).join('')}<div class="card"><h3>数据流</h3><p>${esc(m.dataFlow||'')}</p></div>`;else if(S.tab==='reading')html=`<div class="card hint"><b>阅读指南</b><p>不要从第一行开始读，按下面顺序阅读。</p></div><div class="list">${(codeData.readingPath||[]).map((s,i)=>`<div class="item" onclick="pick('${s.node}')"><div class="muted">Step ${i+1}</div><h3><code>${esc(s.label||s.node)}</code></h3><p>${esc(s.why||'')}</p></div>`).join('')}</div>`;else if(S.tab==='tasks')html=`<div class="list">${(codeData.tasks||[]).map(t=>`<div class="item" onclick="pick('${t.node}')"><b>${esc(t.title)}</b><p>${esc(t.desc||'')}</p></div>`).join('')}</div>`;else if(S.tab==='prompts'){let ps=nodes().filter(n=>n.type==='Prompt'||n.prompt);html=ps.length?cards(ps):'<div class="card">未识别到 prompt，或 prompt 已合并到节点详情中。</div>'}else if(S.tab==='state')html=`<div class="card"><h3>状态 / 数据</h3><p>${esc(codeData.stateData?.summary||'')}</p></div>${(codeData.stateData?.items||[]).map(x=>`<div class="card"><h3><code>${esc(x.name)}</code></h3><p><b>存什么：</b>${esc(x.stores||'')}</p><p><b>为什么重要：</b>${esc(x.importance||'')}</p><p><b>依赖节点：</b>${esc((x.depends||[]).join(', '))}</p></div>`).join('')}`;$('tab').innerHTML=html}
function renderFlow(){let f=codeData.flow||[];$('flow').innerHTML=f.length?`<div class="flow-inner">${f.map(flowItem).join('')}</div>`:'<div class="empty">未提供流程数据</div>'}
function flowItem(x){if(typeof x==='string')return flowNode(x);if(x.type==='arrow')return'<div class="arrow">↓</div>';if(x.type==='branch')return`<div class="branch">${x.paths.map(p=>`<div class="branch-col">${p.label?`<div class="muted">${esc(p.label)}</div>`:''}${p.nodes.map(flowItem).join('')}</div>`).join('')}</div>`;return x.node?flowNode(x.node):''}
function flowNode(id){let n=get(id);return n?`<div class="node ${n.type} ${S.sel===id?'active':''}" onclick="pick('${id}')"><div class="name"><span class="dot ${n.type}"></span>${esc(n.name)}</div><div class="desc">${esc(n.short||n.role||'')}</div></div>`:''}
function pick(id){S.sel=id;renderFlow();detail()}
function detail(){let n=get(S.sel);if(!n){$('detail').innerHTML='<div class="empty">点击节点查看真实代码、实现范式和解读</div>';return}let html=`<h2><code>${esc(n.name)}</code></h2><span class="badge"><span class="dot ${n.type}"></span>${esc(n.type)}</span>`;if(n.sourceLine)html+=`<div style="margin:10px 0"><span class="source-loc" title="点击查看" onclick="${n.sourceLink?`window.open('${n.sourceLink}','_blank')`:'void(0)'}">📍 ${esc(n.sourceFile||'')}:${esc(n.sourceLine)}${n.sourceEnd?'-'+esc(n.sourceEnd):''} 行</span></div>`;html+=`<div class="grid"><div>实现范式</div><div>${esc(n.paradigm||'')}</div><div>职责</div><div>${esc(n.role||'')}</div><div>输入</div><div>${esc(n.input||'无')}</div><div>输出</div><div>${esc(n.output||'无')}</div><div>流程位置</div><div>${esc(n.position||'')}</div></div>`;if(n.type==='Prompt'&&n.prompt){let pt=typeof n.prompt==='string'?n.prompt:JSON.stringify(n.prompt,null,2);html+=`<div class="full-prompt"><div class="prompt-label">完整 Prompt 内容</div><div class="prompt-text">${esc(pt)}</div></div>`}html+=`<div class="card"><h3>关键代码</h3><pre><code>${esc(n.code||'未收录代码片段')}</code></pre></div><div class="card"><h3>代码逻辑解读</h3><p>${esc(n.explanation||'')}</p></div><div class="card"><h3>学习重点</h3><p>${esc(n.learning||'')}</p></div>${n.ignore?`<div class="card"><h3>可暂时忽略</h3><p>${esc(n.ignore)}</p></div>`:''}`;$('detail').innerHTML=html}
function expandPrompt(id){let el=document.querySelector(`.prompt-preview[data-id="${id}"]`);if(!el)return;if(el.classList.contains('collapsed')){el.classList.remove('collapsed');let btn=el.nextElementSibling;if(btn&&btn.classList.contains('prompt-expand'))btn.textContent='▲ 收起';btn&&btn.setAttribute('onclick',`expandPrompt('${id}')`)}else{el.classList.add('collapsed');let btn=el.nextElementSibling;if(btn&&btn.classList.contains('prompt-expand'))btn.textContent='▼ 展开'}}
init();
</script>
</body>
</html>
