<script>
const codeData={"file": {"name": "1-hybrid_wealth_advisor_langgraph_langsmith.py", "path": "E:\\AI-Projects\\micro-code-case\\test-evaluation-langSmith\\1-hybrid_wealth_advisor_langgraph_langsmith.py", "title": "混合智能体 - 财富管理投顾AI助手", "role": "基于 LangGraph 实现的混合型财富顾问智能体，结合反应式快速响应与深思熟虑深度分析", "frameworks": ["LangGraph", "LangChain", "LangSmith", "Pydantic", "Tongyi(Qwen)"], "line_count": 731, "function_count": 9, "class_count": 4}, "defaultNode": "create_workflow", "nodes": {"assess_query": {"id": "assess_query", "name": "assess_query", "type": "Core", "paradigm": "LangChain (prompt | llm | JsonOutputParser())", "role": "工作流入口节点：调用 LLM 分类用户查询，决定走反应式还是深思熟虑路径", "input": "state.user_query", "output": "state.query_type, state.processing_mode", "position": "入口", "code": "def assess_query(state: WealthAdvisorState) -> WealthAdvisorState:  # 节点函数定义\n    prompt = ChatPromptTemplate.from_template(ASSESSMENT_PROMPT)  # 加载分类提示词\n    chain = prompt | llm | JsonOutputParser()                     # 构建 LLM 链\n    result = chain.invoke({\"user_query\": state[\"user_query\"]})    # 执行分类\n    processing_mode = result.get(\"processing_mode\", \"reactive\")   # 提取模式，默认 reactive\n    if processing_mode not in [\"reactive\", \"deliberative\"]:\n        processing_mode = \"reactive\"                               # fallback 兜底\n    query_type = result.get(\"query_type\", \"emergency\")            # 提取类型，默认 emergency\n    if query_type not in [\"emergency\", \"informational\", \"analytical\"]:\n        query_type = \"emergency\"                                   # fallback 兜底\n    return {**state, \"query_type\": query_type, \"processing_mode\": processing_mode}  # 更新 state", "explanation": "工作流第一个节点。用 ASSESSMENT_PROMPT 让 LLM 判断查询类型和处理模式，结果写入 state 的两个字段，后续条件边根据 processing_mode 做路由。", "learning": "LangGraph 节点函数签名固定：接收 state，返回更新后的 state 字典。只更新新增字段，其余用 **state 展开保留。", "short": "LLM 分类路由", "prompt": "assessment_prompt"}, "reactive_processing": {"id": "reactive_processing", "name": "reactive_processing", "type": "Core", "paradigm": "LangChain (prompt | llm | StrOutputParser()) + 工具调用", "role": "反应式快速响应：两阶段 LLM 处理，先决定是否调用工具，再整合结果生成回答", "input": "state.user_query, state.customer_profile", "output": "state.final_response", "position": "快速分支", "code": "def reactive_processing(state: WealthAdvisorState) -> WealthAdvisorState:  # 反应式处理节点\n    tools_map = {\"上证指数查询\": query_shanghai_index}              # 可用工具映射\n    prompt = ChatPromptTemplate.from_template(REACTIVE_AGENT_PROMPT) # 加载反应式提示词\n    chain = prompt | llm | StrOutputParser()                        # 构建 LLM 链\n    first_response = chain.invoke({\"input\": state[\"user_query\"]})   # 第一阶段：LLM 决定是否需工具\n    if \"[CALL_TOOL:上证指数查询]\" in first_response:               # 检查工具调用标记\n        tool_result = query_shanghai_index(\"\")                       # 调用工具获取数据\n        final_prompt = ChatPromptTemplate.from_template(FINAL_PROMPT) # 加载最终回答提示词\n        final_chain = final_prompt | llm | StrOutputParser()        # 构建最终链\n        final_response = final_chain.invoke({\"input\": state[\"user_query\"], \"tool_result\": tool_result})\n    else:\n        final_response = first_response.replace(\"[CALL_TOOL:上证指数查询]\", \"\").strip()\n    return {**state, \"final_response\": final_response}               # 写入最终响应", "explanation": "两阶段 LLM 模式：第一阶段让 LLM 决定是否调用工具（通过字符串标记协议），第二阶段用工具结果生成最终回答。比 LangChain 的 ToolCallingAgent 更轻量可控。", "learning": "轻量级工具调用模式：约定字符串标记 [CALL_TOOL:xxx] 协议，手动判断并调用工具，再喂回 LLM 生成最终回答。", "short": "两阶段工具决策", "prompt": "reactive_prompt"}, "collect_data": {"id": "collect_data", "name": "collect_data", "type": "Core", "paradigm": "LangChain (prompt | llm | JsonOutputParser())", "role": "深思熟虑路径第一阶段：用 LLM 确定需要收集的数据类型并模拟生成", "input": "state.user_query, state.customer_profile", "output": "state.market_data, state.current_phase=analyze", "position": "深度分支-第1步", "code": "def collect_data(state: WealthAdvisorState) -> WealthAdvisorState:  # 数据收集节点\n    prompt = ChatPromptTemplate.from_template(DATA_COLLECTION_PROMPT) # 加载数据收集提示词\n    chain = prompt | llm | JsonOutputParser()                         # 构建 LLM 链\n    result = chain.invoke({                                           # 执行数据收集\n        \"user_query\": state[\"user_query\"],\n        \"customer_profile\": json.dumps(state.get(\"customer_profile\"))\n    })\n    return {**state, \"market_data\": result.get(\"collected_data\", {}), \"current_phase\": \"analyze\"}  # 写入数据，标记下一阶段", "explanation": "用 DATA_COLLECTION_PROMPT 让 LLM 模拟收集市场数据，结果存入 state.market_data，current_phase 标记为 analyze 进入下一阶段。", "learning": "多阶段流水线用 current_phase 字段标记进度，每阶段只负责一件事。", "short": "收集市场数据", "prompt": "data_collection_prompt"}, "analyze_data": {"id": "analyze_data", "name": "analyze_data", "type": "Core", "paradigm": "LangChain (prompt | llm | JsonOutputParser()) + 状态回退", "role": "深思熟虑路径第二阶段：基于客户画像和市场数据进行深度投资分析", "input": "state.user_query, state.customer_profile, state.market_data", "output": "state.analysis_results, state.current_phase=recommend", "position": "深度分支-第2步", "code": "def analyze_data(state: WealthAdvisorState) -> WealthAdvisorState:  # 深度分析节点\n    if not state.get(\"market_data\"):                                  # 安全检查：数据是否已收集\n        return {**state, \"error\": \"缺少市场数据\", \"current_phase\": \"collect_data\"}  # 缺少则回退\n    prompt = ChatPromptTemplate.from_template(ANALYSIS_PROMPT)        # 加载分析提示词\n    chain = prompt | llm | JsonOutputParser()                         # 构建 LLM 链\n    result = chain.invoke({                                           # 执行深度分析\n        \"user_query\": state[\"user_query\"],\n        \"customer_profile\": json.dumps(state.get(\"customer_profile\")),\n        \"market_data\": json.dumps(state.get(\"market_data\"))\n    })\n    return {**state, \"analysis_results\": result, \"current_phase\": \"recommend\"}  # 写入结果，标记下一阶段", "explanation": "先检查 market_data 是否已收集（安全检查），不满足则回退到 collect_data 阶段。满足后调用 LLM 执行深度分析，结果存入 analysis_results。", "learning": "回退机制：节点检查前置条件，不满足时修改 current_phase 回到上一步，而非直接报错。", "short": "深度投资分析", "prompt": "analysis_prompt"}, "generate_recommendations": {"id": "generate_recommendations", "name": "generate_recommendations", "type": "Core", "paradigm": "LangChain (prompt | llm | StrOutputParser()) + 状态回退", "role": "深思熟虑路径第三阶段：将分析结果转化为自然语言投资建议", "input": "state.user_query, state.customer_profile, state.analysis_results", "output": "state.final_response, state.current_phase=respond", "position": "深度分支-第3步", "code": "def generate_recommendations(state: WealthAdvisorState) -> WealthAdvisorState:  # 建议生成节点\n    if not state.get(\"analysis_results\"):                            # 安全检查：分析结果是否存在\n        return {**state, \"error\": \"缺少分析结果\", \"current_phase\": \"analyze\"}   # 缺少则回退\n    prompt = ChatPromptTemplate.from_template(RECOMMENDATION_PROMPT)  # 加载建议提示词\n    chain = prompt | llm | StrOutputParser()                          # 构建 LLM 链\n    result = chain.invoke({                                           # 执行建议生成\n        \"user_query\": state[\"user_query\"],\n        \"customer_profile\": json.dumps(state.get(\"customer_profile\")),\n        \"analysis_results\": json.dumps(state.get(\"analysis_results\"))\n    })\n    return {**state, \"final_response\": result, \"current_phase\": \"respond\"}  # 写入最终响应", "explanation": "同样有安全检查，缺少 analysis_results 时回退到 analyze 阶段。用 RECOMMENDATION_PROMPT 将 JSON 分析结果转化为面向客户的自然语言建议。", "learning": "两条路径（reactive 和 deliberative）最终都汇聚到 respond 节点，通过 final_response 字段统一输出。", "short": "生成投资建议", "prompt": "recommendation_prompt"}, "create_workflow": {"id": "create_workflow", "name": "create_wealth_advisor_workflow", "type": "Core", "paradigm": "LangGraph (StateGraph + add_node + add_edge + add_conditional_edges + compile)", "role": "用 LangGraph StateGraph API 装配所有节点和边，定义完整控制流", "input": "无", "output": "编译后的 StateGraph", "position": "装配层", "code": "def create_wealth_advisor_workflow() -> StateGraph:  # 工作流装配函数\n    workflow = StateGraph(WealthAdvisorState)                  # 创建状态图，指定 state 类型\n    workflow.add_node(\"assess\", assess_query)                  # 入口：查询分类与模式选择\n    workflow.add_node(\"reactive\", reactive_processing)         # 分支 A：反应式快速响应\n    workflow.add_node(\"collect_data\", collect_data)            # 分支 B：深思熟虑-数据收集\n    workflow.add_node(\"analyze\", analyze_data)                 # 分支 B：深思熟虑-深度分析\n    workflow.add_node(\"recommend\", generate_recommendations)   # 分支 B：深思熟虑-生成建议\n    workflow.add_node(\"respond\", respond_function)             # 汇聚点：最终响应输出\n    workflow.set_entry_point(\"assess\")                         # 设置入口点\n    workflow.add_conditional_edges(\"assess\",                   # 条件边：根据模式路由\n        lambda x: \"reactive\" if x.get(\"processing_mode\") == \"reactive\" else \"collect_data\",\n        {\"reactive\": \"reactive\", \"collect_data\": \"collect_data\"})\n    workflow.add_edge(\"reactive\", \"respond\")                   # 快速路径：reactive → respond\n    workflow.add_edge(\"collect_data\", \"analyze\")               # 深度路径串联\n    workflow.add_edge(\"analyze\", \"recommend\")\n    workflow.add_edge(\"recommend\", \"respond\")                  # 两条路径汇聚到 respond\n    workflow.add_edge(\"respond\", END)                          # 结束\n    return workflow.compile()                                  # 编译为可执行图", "explanation": "定义了两个并行路径：快速路径 assess → reactive → respond（2步），深思熟虑路径 assess → collect_data → analyze → recommend → respond（4步）。条件边根据 assess_query 写入的 processing_mode 做路由。", "learning": "LangGraph 图的三要素：节点（执行函数）、固定边（无条件连接）、条件边（根据返回值路由）。", "short": "StateGraph 装配"}, "run_agent": {"id": "run_agent", "name": "run_wealth_advisor", "type": "Entry", "paradigm": "原生 Python + LangGraph invoke + LangSmith RunnableConfig", "role": "外部调用入口：组装初始 state，可选传入 LangSmith 配置，调用 workflow.invoke()", "input": "user_query, customer_id", "output": "最终 state dict", "position": "外部入口", "code": "def run_wealth_advisor(user_query: str, customer_id: str = \"customer1\") -> Dict[str, Any]:  # 外部调用入口\n    agent = create_wealth_advisor_workflow()                     # 编译工作流图\n    customer_profile = SAMPLE_CUSTOMER_PROFILES.get(customer_id)  # 获取客户画像\n    initial_state = {                                            # 构建初始 state\n        \"user_query\": user_query, \"customer_profile\": customer_profile,\n        \"query_type\": None, \"processing_mode\": None,\n        \"market_data\": None, \"analysis_results\": None,\n        \"final_response\": None, \"current_phase\": \"assess\", \"error\": None\n    }\n    if LANGSMITH_ENABLED:                                        # LangSmith 配置\n        config = RunnableConfig(\n            tags=[\"wealth-advisor\", \"hybrid-agent\", ...],        # 标签用于过滤\n            metadata={\"customer_id\": customer_id, ...},           # 元数据附加\n            run_name=f\"wealth-advisor-{customer_id}-...\")        # run 名称\n    result = agent.invoke(initial_state, config=config) if config else agent.invoke(initial_state)\n    return result                                                # 返回最终 state", "explanation": "外部调用智能体的统一入口。三件事：编译工作流图、构建初始 state、调用 invoke() 执行。可选传入 LangSmith config 用于追踪。", "learning": "LangGraph invoke() 的 config 对象：tags 用于分类过滤，metadata 附加键值对，run_name 给每次执行一个可读名称。", "short": "外部调用入口", "ignore": null}, "data_models": {"id": "data_models", "name": "数据模型 (CustomerProfile + WealthAdvisorState)", "type": "State", "paradigm": "Pydantic BaseModel + TypedDict", "role": "定义智能体的核心数据结构：客户画像验证模型和工作流状态", "input": "无", "output": "CustomerProfile, WealthAdvisorState", "position": "数据层", "code": "class CustomerProfile(BaseModel):  # Pydantic 客户画像模型\n    customer_id: str                              # 客户ID\n    risk_tolerance: Literal[\"保守型\", ..., \"进取型\"]  # 风险承受能力\n    investment_horizon: Literal[\"短期\", \"中期\", \"长期\"]  # 投资期限\n    financial_goals: List[str]                    # 财务目标列表\n    investment_preferences: List[str]             # 投资偏好列表\n    portfolio_value: float                        # 投资组合总价值\n    current_allocations: Dict[str, float]         # 当前资产配置比例\n\nclass WealthAdvisorState(TypedDict):  # LangGraph 工作流状态\n    user_query: str             # 用户查询（输入）\n    customer_profile: Dict      # 客户画像（输入）\n    query_type: Literal         # emergency/informational/analytical\n    processing_mode: Literal    # reactive/deliberative（决定路由）\n    market_data: Dict           # 收集的市场数据\n    analysis_results: Dict      # 深度分析结果\n    final_response: str         # 最终输出\n    current_phase: str          # 进度标记\n    error: str                  # 错误信息", "explanation": "CustomerProfile 是 Pydantic 模型，用于验证客户画像数据；WealthAdvisorState 是 TypedDict，作为 LangGraph 工作流中传递的上下文。", "learning": "LangGraph 的状态本质是 TypedDict，每个节点接收当前 state，返回 dict 更新特定字段。Pydantic 用于输入验证，TypedDict 用于状态传递。", "short": "数据模型定义"}, "langsmith_config": {"id": "langsmith_config", "name": "LangSmith 配置", "type": "Glue", "paradigm": "工程胶水 (os.getenv + .env 加载)", "role": "从 .env 加载 LangSmith API Key 和追踪开关，构建 RunnableConfig", "input": ".env 文件中的 LANGSMITH_API_KEY, LANGCHAIN_TRACING_V2", "output": "LANGSMITH_ENABLED 布尔值, RunnableConfig 对象", "position": "配置层", "code": "load_dotenv(CURRENT_DIR / \".env\", override=False)          # 加载 .env 文件\nLANGSMITH_API_KEY = os.getenv(\"LANGSMITH_API_KEY\", \"\")       # 读取 API Key\nLANGSMITH_PROJECT = os.getenv(\"LANGCHAIN_PROJECT\") or \"...\"   # 项目名，带 fallback\nLANGSMITH_TRACING_RAW = os.getenv(\"LANGCHAIN_TRACING_V2\", \"\") # 读取追踪开关\nLANGSMITH_ENABLED = LANGSMITH_TRACING_RAW.lower() == \"true\"   # 转为布尔值\nos.environ.setdefault(\"LANGCHAIN_PROJECT\", LANGSMITH_PROJECT) # 确保进程级变量", "explanation": "LangSmith 配置段：从 .env 读取 API Key 和追踪开关，字符串值转布尔标志，确保进程级环境变量已设置。", "learning": "LangSmith 集成只需两个环境变量：LANGSMITH_API_KEY（认证）和 LANGCHAIN_TRACING_V2=true（开关）。设置后 LangChain 自动拦截所有 LLM 调用上报。", "short": "LangSmith 配置", "ignore": "工程配置代码，理解 LangSmith 接入方式即可，无需深究细节"}, "query_shanghai_index": {"id": "query_shanghai_index", "name": "query_shanghai_index", "type": "Utility", "paradigm": "原生 Python（模拟数据返回）", "role": "模拟工具函数：返回固定的上证指数行情数据，供 reactive_processing 调用", "input": "无（忽略参数）", "output": "上证指数行情字符串", "position": "工具层", "code": "def query_shanghai_index(_: str = \"\") -> str:  # 工具函数（模拟版）\n    name = \"上证指数\"                             # 指数名称\n    price = \"3125.62\"                             # 当前点位（固定值）\n    change = \"6.32\"                               # 涨跌（固定值）\n    pct = \"0.20\"                                  # 涨跌幅（固定值）\n    result = f\"{name} 当前点位: {price}，涨跌: {change}，涨跌幅: {pct}%\"\n    return result", "explanation": "模拟版工具函数，直接返回固定行情数据，避免外部 API 不可用导致报错。在 reactive_processing 中被条件调用。", "learning": "轻量级工具调用的实现模式：函数签名简单，直接返回字符串，在 LLM 决定调用时执行。", "short": "上证指数查询工具"}, "main_cli": {"id": "main_cli", "name": "__main__ CLI 入口", "type": "Glue", "paradigm": "原生 Python（命令行交互）", "role": "提供示例查询选择、客户选择、计时和结果展示的终端交互入口", "input": "用户终端输入", "output": "格式化打印处理结果", "position": "测试入口", "code": "if __name__ == \"__main__\":                              # CLI 入口\n    SAMPLE_QUERIES = [                               # 6 个示例查询\n        \"今天上证指数的表现如何？\",                   # → reactive\n        \"我的投资组合中科技股占比是多少？\",           # → reactive\n        \"请解释一下什么是ETF？\",                     # → reactive\n        \"如何应对可能的经济衰退？\",                   # → deliberative\n        \"评估当前投资策略并提供优化建议\",             # → deliberative\n        \"设计一个10年期的教育金投资计划\",             # → deliberative\n    ]\n    choice = input(\"\\n请输入选项数字(0-6): \")        # 用户选择查询\n    customer_choice = input(\"\\n选择客户 (1/2): \")   # 用户选择客户\n    result = run_wealth_advisor(user_query, customer_id)  # 调用智能体\n    print(result.get(\"final_response\"))              # 打印结果", "explanation": "提供 6 个示例查询，覆盖三种查询类型。用户选择示例或自定义输入，选择客户类型，计时执行并打印结果。", "learning": "__main__ 是快速测试入口。好的 __main__ 提供示例数据、清晰的输出格式和错误处理。", "short": "CLI 测试入口", "ignore": "CLI 交互代码，不影响核心逻辑，了解测试方式即可"}}, "flow": ["assess_query", {"type": "branch", "paths": [{"label": "reactive 快速响应", "nodes": ["reactive_processing"]}, {"label": "deliberative 深度分析", "nodes": ["collect_data", "analyze_data", "generate_recommendations"]}]}, {"type": "arrow"}, "create_workflow", {"type": "arrow"}, "run_agent"], "overview": {"what": "一个混合型财富管理投顾AI助手，结合反应式架构的快速响应能力和深思熟虑架构的深度分析能力，通过 LLM 协调层动态切换处理模式", "function": "根据用户查询的复杂度，自动选择快速响应（2步：分类→回答）或深度分析（4步：分类→收集→分析→建议）路径", "type": "LangGraph 状态机工作流", "entry": "run_wealth_advisor(user_query, customer_id)", "advice": "建议先看 create_workflow 理解图的整体拓扑，再看数据模型理解状态传递，最后逐个节点看实现", "key_learning": "核心学习点：1) LLM 协调层做路由判断（而非 if/elif）；2) 两阶段 LLM 工具调用模式；3) 多阶段流水线的状态回退机制"}, "mentalModel": {"metaphor": "像一个分诊台：病人（用户查询）先到分诊护士（assess_query 协调层），护士判断是感冒（简单查询 → 快速拿药 → reactive）还是需要全面检查（复杂查询 → 抽血化验 → collect → 影像检查 → analyze → 医生诊断 → recommend），最后都到药房取药（respond）离开", "concepts": [{"title": "反应式架构", "text": "快速响应，一步到位。适合已知问题的标准查询，像急诊科的快速分诊"}, {"title": "深思熟虑架构", "text": "多阶段深度分析，先收集信息再判断再建议。像住院的全流程检查"}, {"title": "协调层", "text": "LLM 充当路由器，根据查询内容智能选择处理路径，是分诊台的护士"}], "dataFlow": "用户查询 → 状态初始化 → assess（分类+路由） → [reactive快速回答 | collect→analyze→recommend深度分析] → respond输出"}, "readingPath": [{"node": "create_workflow", "label": "create_wealth_advisor_workflow", "why": "先理解图的拓扑结构——有哪些节点、怎么连接、入口在哪"}, {"node": "data_models", "label": "数据模型 (CustomerProfile + WealthAdvisorState)", "why": "理解 state 传递的字段，是读懂每个节点的前提"}, {"node": "assess_query", "label": "assess_query", "why": "看入口节点如何调用 LLM 分类，conditional_edges 如何根据 processing_mode 路由"}, {"node": "reactive_processing", "label": "reactive_processing", "why": "看快速路径的实现，包括两阶段 LLM 和工具调用"}, {"node": "collect_data", "label": "collect_data → analyze_data → generate_recommendations", "why": "看深度分析三阶段如何串联，current_phase 如何标记进度，安全检查如何回退"}, {"node": "run_agent", "label": "run_wealth_advisor", "why": "看外部如何调用整个智能体，LangSmith config 如何传入"}, {"node": "langsmith_config", "label": "LangSmith 配置", "why": "理解追踪集成方式"}, {"node": "query_shanghai_index", "label": "query_shanghai_index", "why": "了解工具函数的实现方式"}], "tasks": [{"node": "run_agent", "title": "我想看入口在哪里", "desc": "看 run_wealth_advisor 如何组装初始 state 并调用 workflow.invoke()"}, {"node": "create_workflow", "title": "我想看工作流怎么装配的", "desc": "看 StateGraph 如何添加节点、设置入口点、定义条件边和固定边，最后编译为可执行图"}, {"node": "assess_query", "title": "我想看路由怎么决定的", "desc": "看 LLM 如何通过 ASSESSMENT_PROMPT 判断查询类型，conditional_edges 如何根据 processing_mode 路由"}, {"node": "reactive_processing", "title": "我想看工具调用怎么写", "desc": "看两阶段 LLM 模式：先让 LLM 决定是否需要工具（字符串标记协议），再调用工具并整合结果"}, {"node": "collect_data", "title": "我想看 LLM 调用链怎么写", "desc": "看 prompt | llm | JsonOutputParser() 管道模式，以及不同节点使用的五个提示词模板"}, {"node": "analyze_data", "title": "我想看状态怎么流转的", "desc": "看深思熟虑模式三节点如何通过 current_phase 字段标记进度，以及安全检查如何实现回退机制"}, {"node": "data_models", "title": "我想看数据结构定义", "desc": "看 CustomerProfile、WealthAdvisorState 等 Pydantic 模型和 TypedDict 的字段定义"}, {"node": "langsmith_config", "title": "我想看 LangSmith 怎么接入", "desc": "看 .env 加载、环境变量读取、RunnableConfig 构建，以及 invoke 时如何传入 config"}, {"node": "generate_recommendations", "title": "我想看最终回答在哪里生成", "desc": "看两条路径如何都汇聚到 respond 节点，final_response 如何被写入和输出"}, {"node": "analyze_data", "title": "我想看异常怎么处理", "desc": "看每个节点的安全检查：缺少前置数据时如何回退到上一步而非报错"}], "stateData": {"summary": "WealthAdvisorState 是 TypedDict，包含 9 个字段：2个输入字段、3个中间状态字段、1个输出字段、2个控制字段、1个错误字段", "items": [{"name": "user_query", "stores": "用户原始查询文本", "importance": "必须，所有节点都读取", "depends": []}, {"name": "customer_profile", "stores": "客户画像字典", "importance": "必须，reactive 和 deliberative 都需要", "depends": []}, {"name": "query_type", "stores": "emergency/informational/analytical", "importance": "assess_query 后写入，用于调试和追踪", "depends": ["assess_query"]}, {"name": "processing_mode", "stores": "reactive/deliberative", "importance": "assess_query 后写入，决定条件边路由", "depends": ["assess_query"]}, {"name": "market_data", "stores": "收集的市场数据", "importance": "collect_data 后写入，analyze_data 的前置条件", "depends": ["collect_data"]}, {"name": "analysis_results", "stores": "深度分析的 JSON 结果", "importance": "analyze_data 后写入，generate_recommendations 的前置条件", "depends": ["analyze_data"]}, {"name": "final_response", "stores": "最终输出给客户的回答", "importance": "reactive 或 generate_recommendations 写入，最终输出", "depends": ["reactive_processing | generate_recommendations"]}, {"name": "current_phase", "stores": "assess/analyze/recommend/respond", "importance": "标记深思熟虑流水线进度，用于回退", "depends": ["collect_data | analyze_data | generate_recommendations"]}, {"name": "error", "stores": "错误信息", "importance": "任何节点出错时写入，便于调试", "depends": ["任意节点"]}]}};
const S={tab:'overview',filter:'All',q:'',sel:codeData.defaultNode||null};
const tabs=[['overview','概述'],['flow','流程图'],['model','思维模型'],['reading','阅读路径'],['tasks','常用任务'],['prompts','提示词'],['state','状态 / 数据']];
const types=['All','Entry','Core','Utility','External','Prompt','State','Glue'];
const $=id=>document.getElementById(id);const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const nodes=()=>Object.values(codeData.nodes||{});const get=id=>(codeData.nodes||{})[id];
function init(){document.title=codeData.file.title||codeData.file.name;$('title').textContent=codeData.file.title||codeData.file.name;$('path').textContent=codeData.file.path||'';$('role').textContent=codeData.file.role||'';$('tags').innerHTML=(codeData.file.frameworks||[]).map(x=>`<span class="tag">${esc(x)}</span>`).join('');$('q').oninput=e=>{S.q=e.target.value;renderTab()};renderAll();if(S.sel)detail()}
function filtered(){let q=S.q.toLowerCase();return nodes().filter(n=>(S.filter==='All'||n.type===S.filter)&&(!q||[n.name,n.role,n.paradigm].join(' ').toLowerCase().includes(q)))}
function renderAll(){renderFilters();renderTabs();renderTab();renderFlow();detail()}
function renderFilters(){let has=new Set(nodes().map(n=>n.type));$('filters').innerHTML=types.filter(t=>t==='All'||has.has(t)).map(t=>`<button class="pill ${S.filter===t?'active':''}" onclick="S.filter='${t}';renderAll()">${t==='All'?'全部':`<span class="dot ${t}"></span>${t}`}</button>`).join('')}
function renderTabs(){$('tabs').innerHTML=tabs.map(([id,l])=>`<button class="tab ${S.tab===id?'active':''}" onclick="S.tab='${id}';renderAll()">${l}</button>`).join('')}
function cards(arr){return `<div class="list">${arr.map(n=>`<div class="item" onclick="pick('${n.id}')"><span class="badge"><span class="dot ${n.type}"></span>${esc(n.type)}</span><h3><code>${esc(n.name)}</code></h3><p>${esc(n.role||'')}</p></div>`).join('')}</div>`}
function renderTab(){let o=codeData.overview||{},m=codeData.mentalModel||{},html='';if(S.tab==='overview')html=`<div class="card"><h3>这个文件是什么？</h3><p>${esc(o.what||codeData.file.role||'')}</p></div><div class="card"><h3>文件概述</h3><div class="grid"><div>功能</div><div>${esc(o.function||'')}</div><div>类型</div><div>${esc(o.type||'')}</div><div>入口</div><div><code>${esc(o.entry||'')}</code></div><div>框架</div><div>${esc((codeData.file.frameworks||[]).join(', '))}</div></div></div><div class="card hint"><b>学习建议</b><p>${esc(o.advice||'先看概述和思维模型，再按阅读路径点击节点学习。')}</p></div>`;else if(S.tab==='flow')html=`<div class="card"><h3>流程图</h3><p class="muted">中间区域展示主流程，点击节点查看右侧代码详情。</p></div>${cards(filtered())}`;else if(S.tab==='model')html=`<div class="card"><h3>思维模型</h3><p>${esc(m.metaphor||'')}</p></div>${(m.concepts||[]).map((c,i)=>`<div class="card"><h3>${i+1}. ${esc(c.title)}</h3><p>${esc(c.text)}</p></div>`).join('')}<div class="card"><h3>数据流</h3><p>${esc(m.dataFlow||'')}</p></div>`;else if(S.tab==='reading')html=`<div class="card hint"><b>阅读指南</b><p>不要从第一行开始读，按下面顺序阅读。</p></div><div class="list">${(codeData.readingPath||[]).map((s,i)=>`<div class="item" onclick="pick('${s.node}')"><div class="muted">Step ${i+1}</div><h3><code>${esc(s.label||s.node)}</code></h3><p>${esc(s.why||'')}</p></div>`).join('')}</div>`;else if(S.tab==='tasks')html=`<div class="list">${(codeData.tasks||[]).map(t=>`<div class="item" onclick="pick('${t.node}')"><b>${esc(t.title)}</b><p>${esc(t.desc||'')}</p></div>`).join('')}</div>`;else if(S.tab==='prompts'){let ps=nodes().filter(n=>n.type==='Prompt'||n.prompt);html=ps.length?cards(ps):'<div class="card">未识别到 prompt，或 prompt 已合并到节点详情中。</div>'}else if(S.tab==='state')html=`<div class="card"><h3>状态 / 数据</h3><p>${esc(codeData.stateData?.summary||'')}</p></div>${(codeData.stateData?.items||[]).map(x=>`<div class="card"><h3><code>${esc(x.name)}</code></h3><p><b>存什么：</b>${esc(x.stores||'')}</p><p><b>为什么重要：</b>${esc(x.importance||'')}</p><p><b>依赖节点：</b>${esc((x.depends||[]).join(', '))}</p></div>`).join('')}`;$('tab').innerHTML=html}
function renderFlow(){let f=codeData.flow||[];$('flow').innerHTML=f.length?`<div class="flow-inner">${f.map(flowItem).join('')}</div>`:'<div class="empty">未提供流程数据</div>'}
function flowItem(x){if(typeof x==='string')return flowNode(x);if(x.type==='arrow')return'<div class="arrow">↓</div>';if(x.type==='branch')return`<div class="branch">${x.paths.map(p=>`<div class="branch-col">${p.label?`<div class="muted">${esc(p.label)}</div>`:''}${p.nodes.map(flowItem).join('')}</div>`).join('')}</div>`;return x.node?flowNode(x.node):''}
function flowNode(id){let n=get(id);return n?`<div class="node ${n.type} ${S.sel===id?'active':''}" onclick="pick('${id}')"><div class="name"><span class="dot ${n.type}"></span>${esc(n.name)}</div><div class="desc">${esc(n.short||n.role||'')}</div></div>`:''}
function pick(id){S.sel=id;renderFlow();detail()}
function detail(){let n=get(S.sel);$('detail').innerHTML=n?`<h2><code>${esc(n.name)}</code></h2><span class="badge"><span class="dot ${n.type}"></span>${esc(n.type)}</span><div class="grid"><div>实现范式</div><div>${esc(n.paradigm||'')}</div><div>职责</div><div>${esc(n.role||'')}</div><div>输入</div><div>${esc(n.input||'无')}</div><div>输出</div><div>${esc(n.output||'无')}</div><div>流程位置</div><div>${esc(n.position||'')}</div></div><div class="card"><h3>关键代码</h3><pre><code>${esc(n.code||'未收录代码片段')}</code></pre></div><div class="card"><h3>代码逻辑解读</h3><p>${esc(n.explanation||'')}</p></div><div class="card"><h3>学习重点</h3><p>${esc(n.learning||'')}</p></div>${n.ignore?`<div class="card"><h3>可暂时忽略</h3><p>${esc(n.ignore)}</p></div>`:''}${n.prompt?`<div class="card"><h3>相关 Prompt</h3><pre><code>${esc(typeof n.prompt==='string'?n.prompt:JSON.stringify(n.prompt,null,2))}</code></pre></div>`:''}`:'<div class="empty">点击节点查看真实代码、实现范式和解读</div>'}
init();
</script>
