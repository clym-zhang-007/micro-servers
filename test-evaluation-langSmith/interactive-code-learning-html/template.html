<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>__PAGE_TITLE__</title>
<style>
:root{--bg:#0b0f17;--p:#121821;--p2:#0d1118;--b:#273241;--t:#e6edf6;--m:#91a0b5;--blue:#3b8cff;--red:#ff5c75;--yellow:#ffd35a;--cyan:#36d6c5;--purple:#b983ff;--green:#7ee787;--gray:#8b949e;--mono:ui-monospace,SFMono-Regular,Consolas,monospace;--sans:Inter,system-ui,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:var(--sans)}header{padding:16px 22px;border-bottom:1px solid var(--b);background:#0d1320;position:sticky;top:0;z-index:5}h1{font-size:20px;margin:0}.sub{color:var(--m);font-size:13px;margin-top:6px}.tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.tag,.pill,.tab,.badge{border:1px solid var(--b);background:#0b1018;color:#c9d7ea;border-radius:999px;padding:4px 9px;font-size:12px}.layout{display:grid;grid-template-columns:390px 1fr 520px;height:calc(100vh - 82px)}aside,main,.detail{overflow:auto}aside{background:var(--p2);border-right:1px solid var(--b);padding:14px}.detail{background:var(--p2);border-left:1px solid var(--b);padding:16px}main{padding:18px}.legend{position:fixed;left:410px;bottom:12px;background:#121821dd;border:1px solid var(--b);border-radius:12px;padding:10px 12px;font-size:12px}.legend div{margin:4px 0}.search{width:100%;padding:10px;border:1px solid var(--b);border-radius:10px;background:#080d14;color:var(--t)}.row{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.pill,.tab{cursor:pointer}.active{border-color:var(--blue);color:#d9eaff}.card{background:var(--p);border:1px solid var(--b);border-radius:14px;padding:14px;margin:12px 0}.hint{background:rgba(255,211,90,.08);border-color:rgba(255,211,90,.35)}.muted{color:var(--m)}.flow{min-height:100%;display:flex;align-items:flex-start;justify-content:center}.flow-inner{display:flex;flex-direction:column;align-items:center;gap:13px;padding:20px}.node{min-width:210px;max-width:330px;text-align:center;cursor:pointer;border:2px solid var(--b);background:#101722;border-radius:12px;padding:12px}.node:hover{transform:translateY(-1px)}.node.active{box-shadow:0 0 0 3px rgba(59,140,255,.2)}.name,code,pre{font-family:var(--mono)}.name{font-weight:800;font-size:13px}.desc{color:var(--m);font-size:12px;margin-top:5px}.Entry{border-color:var(--cyan)}.Core{border-color:var(--red)}.Utility{border-color:var(--yellow)}.External{border-color:var(--blue)}.Prompt{border-color:var(--purple)}.State{border-color:var(--green)}.Glue{border-color:var(--gray)}.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:7px}.dot.Entry{background:var(--cyan)}.dot.Core{background:var(--red)}.dot.Utility{background:var(--yellow)}.dot.External{background:var(--blue)}.dot.Prompt{background:var(--purple)}.dot.State{background:var(--green)}.dot.Glue{background:var(--gray)}.arrow{color:#637083;font-size:20px}.branch{display:flex;gap:18px;align-items:flex-start;justify-content:center;flex-wrap:wrap}.branch-col{display:flex;flex-direction:column;align-items:center;gap:13px}.list{display:flex;flex-direction:column;gap:10px}.item{cursor:pointer;border:1px solid var(--b);border-radius:12px;padding:12px;background:#0b1018}.item:hover{border-color:var(--blue)}.grid{display:grid;grid-template-columns:92px 1fr;gap:8px;margin:12px 0}.grid div:nth-child(odd){color:var(--m)}pre{margin:0;padding:14px;background:#070b11;border:1px solid var(--b);border-radius:12px;overflow:auto;line-height:1.55;font-size:12px}.empty{height:100%;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--m)}@media(max-width:1300px){.layout{grid-template-columns:380px 1fr}.detail{grid-column:1/-1;height:52vh;border-left:0;border-top:1px solid var(--b)}}
</style>
</head>
<body>
<header><h1 id="title"></h1><div class="sub"><span id="path"></span> —— <span id="role"></span></div><div id="tags" class="tags"></div></header>
<div class="layout"><aside><input id="q" class="search" placeholder="搜索函数名 / 节点 / prompt..."><div id="filters" class="row"></div><div id="tabs" class="row"></div><div id="tab"></div></aside><main><div id="flow" class="flow"></div><div class="legend"><b>图例</b><div><span class="dot Entry"></span>Entry 入口</div><div><span class="dot Core"></span>Core 核心</div><div><span class="dot Utility"></span>Utility 工具</div><div><span class="dot External"></span>External 外部框架</div><div><span class="dot Prompt"></span>Prompt 提示词</div><div><span class="dot State"></span>State 状态</div></div></main><section id="detail" class="detail"><div class="empty">点击节点查看真实代码、实现范式和解读</div></section></div>
<script>
const codeData=__CODE_DATA_JSON__;
const S={tab:'overview',filter:'All',q:'',sel:codeData.defaultNode||null};
const tabs=[['overview','概述'],['flow','流程图'],['model','思维模型'],['reading','阅读路径'],['tasks','常用任务'],['prompts','提示词'],['state','状态 / 数据']];
const types=['All','Entry','Core','Utility','External','Prompt','State','Glue'];
const $=id=>document.getElementById(id);const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const nodes=()=>Object.values(codeData.nodes||{});const get=id=>(codeData.nodes||{})[id];
function init(){document.title=codeData.file.title||codeData.file.name;$('title').textContent=codeData.file.title||codeData.file.name;$('path').textContent=codeData.file.path||'';$('role').textContent=codeData.file.role||'';$('tags').innerHTML=(codeData.file.frameworks||[]).map(x=>`<span class="tag">${esc(x)}</span>`).join('');$('q').oninput=e=>{S.q=e.target.value;renderTab()};renderAll();if(S.sel)detail()}
function filtered(){let q=S.q.toLowerCase();return nodes().filter(n=>(S.filter==='All'||n.type===S.filter)&&(!q||[n.name,n.role,n.paradigm].join(' ').toLowerCase().includes(q)))}
function renderAll(){renderFilters();renderTabs();renderTab();renderFlow();detail()}
function renderFilters(){let has=new Set(nodes().map(n=>n.type));$('filters').innerHTML=types.filter(t=>t==='All'||has.has(t)).map(t=>`<button class="pill ${S.filter===t?'active':''}" onclick="S.filter='${t}';renderAll()">${t==='All'?'全部':`<span class="dot ${t}"></span>${t}`}</button>`).join('')}
function renderTabs(){$('tabs').innerHTML=tabs.map(([id,l])=>`<button class="tab ${S.tab===id?'active':''}" onclick="S.tab='${id}';renderAll()">${l}</button>`).join('')}
function cards(arr){return `<div class="list">${arr.map(n=>`<div class="item" onclick="pick('${n.id}')"><span class="badge"><span class="dot ${n.type}"></span>${esc(n.type)}</span><h3><code>${esc(n.name)}</code></h3><p>${esc(n.role||'')}</p></div>`).join('')}</div>`}
function renderTab(){let o=codeData.overview||{},m=codeData.mentalModel||{},html='';if(S.tab==='overview')html=`<div class="card"><h3>这个文件是什么？</h3><p>${esc(o.what||codeData.file.role||'')}</p></div><div class="card"><h3>文件概述</h3><div class="grid"><div>功能</div><div>${esc(o.function||'')}</div><div>类型</div><div>${esc(o.type||'')}</div><div>入口</div><div><code>${esc(o.entry||'')}</code></div><div>框架</div><div>${esc((codeData.file.frameworks||[]).join(', '))}</div></div></div><div class="card hint"><b>学习建议</b><p>${esc(o.advice||'先看概述和思维模型，再按阅读路径点击节点学习。')}</p></div>`;else if(S.tab==='flow')html=`<div class="card"><h3>流程图</h3><p class="muted">中间区域展示主流程，点击节点查看右侧代码详情。</p></div>${cards(filtered())}`;else if(S.tab==='model')html=`<div class="card"><h3>思维模型</h3><p>${esc(m.metaphor||'')}</p></div>${(m.concepts||[]).map((c,i)=>`<div class="card"><h3>${i+1}. ${esc(c.title)}</h3><p>${esc(c.text)}</p></div>`).join('')}<div class="card"><h3>数据流</h3><p>${esc(m.dataFlow||'')}</p></div>`;else if(S.tab==='reading')html=`<div class="card hint"><b>阅读指南</b><p>不要从第一行开始读，按下面顺序阅读。</p></div><div class="list">${(codeData.readingPath||[]).map((s,i)=>`<div class="item" onclick="pick('${s.node}')"><div class="muted">Step ${i+1}</div><h3><code>${esc(s.label||s.node)}</code></h3><p>${esc(s.why||'')}</p></div>`).join('')}</div>`;else if(S.tab==='tasks')html=`<div class="list">${(codeData.tasks||[]).map(t=>`<div class="item" onclick="pick('${t.node}')"><b>${esc(t.title)}</b><p>${esc(t.desc||'')}</p></div>`).join('')}</div>`;else if(S.tab==='prompts'){let ps=nodes().filter(n=>n.type==='Prompt'||n.prompt);html=ps.length?cards(ps):'<div class="card">未识别到 prompt，或 prompt 已合并到节点详情中。</div>'}else if(S.tab==='state')html=`<div class="card"><h3>状态 / 数据</h3><p>${esc(codeData.stateData?.summary||'')}</p></div>${(codeData.stateData?.items||[]).map(x=>`<div class="card"><h3><code>${esc(x.name)}</code></h3><p><b>存什么：</b>${esc(x.stores||'')}</p><p><b>为什么重要：</b>${esc(x.importance||'')}</p><p><b>依赖节点：</b>${esc((x.depends||[]).join(', '))}</p></div>`).join('')}`;$('tab').innerHTML=html}
function renderFlow(){let f=codeData.flow||[];$('flow').innerHTML=f.length?`<div class="flow-inner">${f.map(flowItem).join('')}</div>`:'<div class="empty">未提供流程数据</div>'}
function flowItem(x){if(typeof x==='string')return flowNode(x);if(x.type==='arrow')return'<div class="arrow">↓</div>';if(x.type==='branch')return`<div class="branch">${x.paths.map(p=>`<div class="branch-col">${p.label?`<div class="muted">${esc(p.label)}</div>`:''}${p.nodes.map(flowItem).join('')}</div>`).join('')}</div>`;return x.node?flowNode(x.node):''}
function flowNode(id){let n=get(id);return n?`<div class="node ${n.type} ${S.sel===id?'active':''}" onclick="pick('${id}')"><div class="name"><span class="dot ${n.type}"></span>${esc(n.name)}</div><div class="desc">${esc(n.short||n.role||'')}</div></div>`:''}
function pick(id){S.sel=id;renderFlow();detail()}
function detail(){let n=get(S.sel);$('detail').innerHTML=n?`<h2><code>${esc(n.name)}</code></h2><span class="badge"><span class="dot ${n.type}"></span>${esc(n.type)}</span><div class="grid"><div>实现范式</div><div>${esc(n.paradigm||'')}</div><div>职责</div><div>${esc(n.role||'')}</div><div>输入</div><div>${esc(n.input||'无')}</div><div>输出</div><div>${esc(n.output||'无')}</div><div>流程位置</div><div>${esc(n.position||'')}</div></div><div class="card"><h3>关键代码</h3><pre><code>${esc(n.code||'未收录代码片段')}</code></pre></div><div class="card"><h3>代码逻辑解读</h3><p>${esc(n.explanation||'')}</p></div><div class="card"><h3>学习重点</h3><p>${esc(n.learning||'')}</p></div>${n.ignore?`<div class="card"><h3>可暂时忽略</h3><p>${esc(n.ignore)}</p></div>`:''}${n.prompt?`<div class="card"><h3>相关 Prompt</h3><pre><code>${esc(typeof n.prompt==='string'?n.prompt:JSON.stringify(n.prompt,null,2))}</code></pre></div>`:''}`:'<div class="empty">点击节点查看真实代码、实现范式和解读</div>'}
init();
</script>
</body>
</html>
